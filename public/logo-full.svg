<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#1A1A1A"/>
  
  <!-- "10" Numerals -->
  <g id="numerals" fill="#0052CC" font-family="Montserrat, sans-serif" font-weight="bold" font-size="48">
    <text x="20" y="70" text-anchor="start">1</text>
    <text x="120" y="150" text-anchor="start">0</text>
  </g>
  
  <!-- Main X Shape -->
  <g id="x-main" stroke="#00D084" stroke-width="12" stroke-linecap="round" fill="none">
    <!-- Top-left to bottom-right diagonal -->
    <line x1="40" y1="40" x2="160" y2="160"/>
    <!-- Top-right to bottom-left diagonal -->
    <line x1="160" y1="40" x2="40" y2="160"/>
  </g>
  
  <!-- Center Accent Circle -->
  <circle cx="100" cy="100" r="8" fill="#00D084" opacity="0.8"/>
  
  <!-- Text: TENXLABS below -->
  <g id="text" fill="#F5F5F5" font-family="Montserrat, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">
    <text x="100" y="185">TENXLABS</text>
  </g>
</svg>
